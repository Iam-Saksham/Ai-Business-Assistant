<!DOCTYPE html>
<html>

<head>
    <title>AI Business Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>AI Business Assistant</h1>

        <label>Customer Name</label>
        <input type="text" id="customer" placeholder="Enter your name">

        <label>Business Type</label>

        <select id="business">
            <option value="">Select Business</option>
            <option value="gym">Gym</option>
            <option value="restaurant">Restaurant</option>
            <option value="salon">Salon</option>
            <option value="clinic">Clinic</option>
            <option value="coaching">Coaching Center</option>
        </select>

        <label>Customer Question</label>

        <textarea id="question"
            placeholder="Ask your question here"></textarea>

        <button onclick="generateReply()">
            Generate Reply
        </button>

        <button onclick="clearHistory()">
            Clear History
        </button>

        <h3>Generated Response</h3>

        <div id="output">
            Your response will appear here...
        </div>

        <h3>Total Queries Processed</h3>

        <div id="counter">
            0
        </div>

        <h3>Last Query</h3>

        <div id="lastQuery">
            No query yet.
        </div>

        <h3>Generated On</h3>

        <div id="timestamp">
            No response generated yet.
        </div>

        <h3>Status</h3>

        <div id="status">
            Waiting for input...
        </div>

        <h3>Query History</h3>

        <ul id="history">
        </ul>

    </div>

    <footer>
        AI Business Assistant v2.0
    </footer>

    <script src="script.js"></script>

</body>

</html>
