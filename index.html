<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Business Assistant v2.0</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <button class="dark-btn" onclick="toggleDarkMode()">
        🌙 Toggle Dark Mode
    </button>

    <div class="container">

        <h1>AI Business Assistant v2.0</h1>

        <div class="dashboard">

            <div class="card">
                <h3>Total Queries</h3>
                <p id="counter">0</p>
            </div>

            <div class="card">
                <h3>Most Used Business</h3>
                <p id="mostUsed">None</p>
            </div>

            <div class="card">
                <h3>Businesses Used</h3>
                <p id="businessCount">0</p>
            </div>

            <div class="card">
                <h3>Average Rating</h3>
                <p id="averageRating">0</p>
            </div>

        </div>

        <label>Customer Name</label>
        <input type="text" id="customer">

        <label>Business Type</label>

        <select id="business">
            <option value="">Select Business</option>
            <option value="Gym">Gym</option>
            <option value="Restaurant">Restaurant</option>
            <option value="Salon">Salon</option>
            <option value="Clinic">Clinic</option>
            <option value="Coaching Center">Coaching Center</option>
        </select>

        <label>Question</label>
        <textarea id="question"></textarea>

        <button onclick="generateReply()">
            Generate Reply
        </button>

        <button onclick="downloadHistory()">
            Export History
        </button>

        <button onclick="clearHistory()">
            Clear History
        </button>

        <h2>Response</h2>

        <div id="output">
            Waiting for input...
        </div>

        <div id="timestamp">
            No timestamp available
        </div>

        <div id="status">
            Ready
        </div>

        <h2>Rate Response</h2>

        <button onclick="rateResponse(1)">
            👍 Helpful
        </button>

        <button onclick="rateResponse(0)">
            👎 Not Helpful
        </button>

        <h2>Search History</h2>

        <input
            type="text"
            id="searchBox"
            placeholder="Search history..."
            onkeyup="searchHistory()">

        <h2>History</h2>

        <ul id="history">
        </ul>

    </div>

    <footer>
        AI Business Assistant v2.0 | Final Release
    </footer>

    <script src="script.js"></script>

</body>

</html>
