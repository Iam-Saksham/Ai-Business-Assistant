<!DOCTYPE html>
<html>
<head>
    <title>AI Business Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>AI Business Assistant</h1>

    <label>Business Type</label>
    <input type="text" id="business" placeholder="Example: Gym">

    <label>Customer Question</label>
    <textarea id="question" placeholder="Ask your question here"></textarea>

    <button onclick="generateReply()">
        Generate Reply
    </button>

    <h3>Generated Response</h3>

    <div id="output">
        Your response will appear here...
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
