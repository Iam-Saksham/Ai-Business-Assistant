<!DOCTYPE html>
<html>

<head>
    <title>AI Business Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <button id="darkModeBtn" onclick="toggleDarkMode()">
        🌙 Toggle Dark Mode
    </button>

    <div class="container">

        <h1>AI Business Assistant</h1>

        <label>Customer Name</label>
        <input type="text" id="customer">

        <label>Business Type</label>

        <select id="business">
            <option value="">Select Business</option>
            <option value="gym">Gym</option>
            <option value="restaurant">Restaurant</option>
            <option value="salon">Salon</option>
            <option value="clinic">Clinic</option>
            <option value="coaching">Coaching Center</option>
        </select>

        <label>Customer Question</label>

        <textarea id="question"></textarea>

        <button onclick="generateReply()">
            Generate Reply
        </button>

        <button onclick="downloadHistory()">
            Download History
        </button>

        <button onclick="clearHistory()">
            Clear History
        </button>

        <h3>Generated Response</h3>
        <div id="output"></div>

        <h3>Total Queries</h3>
        <div id="counter">0</div>

        <h3>Most Used Business</h3>
        <div id="mostUsed">No Data</div>

        <h3>Businesses Used</h3>
        <div id="businessCount">0</div>

        <h3>Last Query</h3>
        <div id="lastQuery">No query yet</div>

        <h3>Generated On</h3>
        <div id="timestamp"></div>

        <h3>Status</h3>
        <div id="status"></div>

        <h3>Query History</h3>
        <ul id="history"></ul>

    </div>

    <footer>
        AI Business Assistant v1.0
    </footer>

    <script src="script.js"></script>

</body>

</html>
